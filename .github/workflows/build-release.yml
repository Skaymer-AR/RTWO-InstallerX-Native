name: Build recovery bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "module-source/**"
      - "tools/assemble-release.py"
      - "tools/build-installerx-from-source.sh"
      - ".github/workflows/build-release.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build InstallerX with native package ID
        env:
          WORKDIR: ${{ github.workspace }}/build/InstallerX-Revived
          APP_ID: com.google.android.packageinstaller
        run: ./tools/build-installerx-from-source.sh

      - name: Locate APK and assemble TWRP ZIPs
        run: |
          APK="$(find build/InstallerX-Revived/app/build/outputs/apk -type f -name '*.apk' | head -n1)"
          test -n "$APK"
          python3 tools/assemble-release.py --apk "$APK" --out dist

      - name: Validate generated archives
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import zipfile
          for p in Path('dist').glob('*.zip'):
              with zipfile.ZipFile(p) as z:
                  assert z.testzip() is None, p
              print('OK', p)
          PY
          cd dist
          sha256sum -c RTWO-InstallerX-Native-v1.1-SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: RTWO-InstallerX-Native-v1.1
          path: dist/*
          if-no-files-found: error
